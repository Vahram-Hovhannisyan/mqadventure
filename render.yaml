services:
  - type: web
    name: laravel-app
    runtime: php
    plan: free
    branch: main

    buildCommand: |
      composer install --no-dev --optimize-autoloader
      php artisan key:generate --force
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache

    startCommand: |
      php artisan migrate --force
      php -S 0.0.0.0:$PORT -t public

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: false

      - key: APP_KEY
        generateValue: true
